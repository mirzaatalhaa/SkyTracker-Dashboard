name: Deploy Skytracker

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.7
        with: 
          host: ${{ secrets.EC2_HOST}}
          username: ${{ secrets.EC2_USER}}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/SkyTracker-Dashboard
            git pull origin master
            sudo docker-compose up -d --build